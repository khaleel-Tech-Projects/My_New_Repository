<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
        }

        .container {
            margin-top: 50px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .btn {
            border-radius: 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #343a40;
        }

        .card-header {
            background-color: #343a40;
            color: white;
            font-weight: bold;
        }

        .table td, .table th {
            vertical-align: middle;
        }
    </style>
</head>
<body>

{% include 'navbar.html' %}

<div class="container">
    <h2>Product List</h2>

    <!-- Add Product Button -->
    <div class="text-end mb-3">
        <a href="/add" class="btn btn-primary">+ Add New Product</a>
    </div>

    <!-- Products Table -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">All Products</h5>
        </div>
        <div class="card-body">
            {% if products %}
            <table class="table table-bordered table-striped">
                <thead class="table-dark text-center">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Price (₹)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for product in products %}
                    <tr>
                        <td class="text-center">{{ loop.index }}</td>
                        <td>{{ product.name }}</td>
                        <td>₹{{ product.price }}</td>
                        <td class="text-center">
                            <a href="/view/{{ product.id }}" class="btn btn-sm btn-info me-1">View</a>
                            <a href="/edit/{{ product.id }}" class="btn btn-sm btn-warning me-1">Edit</a>
                            <a href="/delete/{{ product.id }}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p class="text-muted text-center">No products available.</p>
            {% endif %}
        </div>
    </div>
</div>

<!-- Optional Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
