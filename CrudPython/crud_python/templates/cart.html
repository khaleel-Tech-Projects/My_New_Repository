<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

{% include 'navbar.html' %}

<div class="container mt-4">
    <h2>Your Cart</h2>

    {% if cart_items %}
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for item in cart_items %}
            <tr>
                <td>{{ item[1] }}</td>  <!-- Product Name -->
                <td>{{ item[2] }}</td>  <!-- Category -->
                <td>₹{{ item[3] }}</td>  <!-- Price -->
                <td>{{ item[4] }}</td>  <!-- Quantity -->
                <td>₹{{ item[3] * item[4] }}</td>  <!-- Total Price for this item -->
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="/checkout" class="btn btn-success">Proceed to Checkout</a>

    {% else %}
    <p>Your cart is empty.</p>
    {% endif %}
</div>

</body>
</html>
