<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card-body {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-weight: bold;
            color: #343a40;
        }

        .card-text {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .btn-primary {
            border-radius: 20px;
        }

        .no-products {
            text-align: center;
            font-size: 1.2rem;
            color: #dc3545;
        }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container mt-4">
        <h2 class="text-center">Welcome, {{ user.name }}</h2>
        <p class="lead text-center mb-4">Here are your available products:</p>

        <div class="row">
            {% for product in products %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="card-text"><strong>Category:</strong> {{ product.category }}</p>
                        <p class="card-text"><strong>Stock:</strong> {{ product.stock }}</p>
                        <p class="card-text"><strong>Price:</strong> ₹{{ product.price }}</p>
                        <a href="/view_product_details/{{ product.id }}" class="btn btn-primary w-100">View Details</a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="col-12 no-products">
                <p>No products available yet.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
